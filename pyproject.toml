[tool.ruff]
line-length = 110
target-version = "py311"
extend-exclude = ["notebook", "doc", "data", "models", "logs", "pycocotools"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["test", "api/tests"]
addopts = "-q"
